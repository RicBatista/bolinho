spring.application.name=bolinho-bacalhau

# URL/user/senha do PostgreSQL vêm de ProdDataSourceConfig (Railway PG*, DATABASE_URL postgresql://, ou SPRING_DATASOURCE_*)

spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

server.port=${PORT:8080}
spring.h2.console.enabled=false

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

jwt.secret=${JWT_SECRET:bolinho-secret-mude-em-producao}
jwt.expiration-hours=${JWT_EXPIRATION_HOURS:24}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

zapi.enabled=${ZAPI_ENABLED:false}
zapi.instance-id=${ZAPI_INSTANCE_ID:}
zapi.token=${ZAPI_TOKEN:}
zapi.owner-phone=${ZAPI_OWNER_PHONE:}
