spring.application.name=bolinho-bacalhau

# URL/user/senha: só ProdDataSourceConfig (@Profile prod). Não use spring.datasource.url=${DATABASE_URL} aqui —
# o Railway envia postgresql://… (não-JDBC); o bean converte para jdbc:postgresql://…

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Esquema já existente no Railway: baseline + migrações incrementais
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

server.port=${PORT:8080}
spring.h2.console.enabled=false

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

jwt.secret=${JWT_SECRET:bolinho-secret-mude-em-producao}
jwt.expiration-hours=${JWT_EXPIRATION_HOURS:24}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

zapi.enabled=${ZAPI_ENABLED:false}
zapi.instance-id=${ZAPI_INSTANCE_ID:}
zapi.token=${ZAPI_TOKEN:}
zapi.owner-phone=${ZAPI_OWNER_PHONE:}
