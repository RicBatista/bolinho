spring.application.name=bolinho-bacalhau

# H2 (desenvolvimento)
spring.datasource.url=jdbc:h2:file:./data/bolinhodb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=admin
spring.datasource.password=bolinho123
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Flyway só no perfil prod (H2 dev continua só com Hibernate)
spring.flyway.enabled=false

server.port=8080

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

jwt.secret=bolinho-bacalhau-dev-secret-key-mude-isso-em-producao-2024
jwt.expiration-hours=24

cors.allowed-origins=http://localhost:3000,http://localhost:5173

# --- Z-API (WhatsApp) — envio real ---
# Com zapi.enabled=false as mensagens só vão para os logs da API (e o histórico marca como enviado simulado).
# Para envio real: zapi.enabled=true e preencha instance-id, token e owner-phone (painel Z-API).
# Não commite tokens. Em produção (Railway) use: ZAPI_ENABLED, ZAPI_INSTANCE_ID, ZAPI_TOKEN, ZAPI_OWNER_PHONE.
zapi.enabled=false
zapi.instance-id=
zapi.token=
zapi.owner-phone=
