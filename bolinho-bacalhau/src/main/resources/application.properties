spring.application.name=bolinho-bacalhau

# H2 (desenvolvimento)
spring.datasource.url=jdbc:h2:file:./data/bolinhodb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=admin
spring.datasource.password=bolinho123
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Flyway só no perfil prod (H2 dev continua só com Hibernate)
spring.flyway.enabled=false

server.port=8080

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

jwt.secret=bolinho-bacalhau-dev-secret-key-mude-isso-em-producao-2024
jwt.expiration-hours=24

cors.allowed-origins=http://localhost:3000,http://localhost:5173

# --- Z-API (WhatsApp) ---
# IMPORTANTE: estas chaves leem sempre as variáveis de ambiente ZAPI_* (Railway/Docker), mesmo que
# SPRING_PROFILES_ACTIVE=prod não esteja definido — antes só existiam em application-prod.properties e eram ignoradas.
# Local sem env: permanece desligado. Para testar Z-API no PC: export ZAPI_ENABLED=true + credenciais (não commite tokens).
zapi.enabled=${ZAPI_ENABLED:false}
zapi.instance-id=${ZAPI_INSTANCE_ID:}
zapi.token=${ZAPI_TOKEN:}
zapi.owner-phone=${ZAPI_OWNER_PHONE:}
