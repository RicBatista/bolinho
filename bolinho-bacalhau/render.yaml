services:
  - type: web
    name: bolinho-bacalhau-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: bolinho-bacalhau-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: bolinho-bacalhau-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: bolinho-bacalhau-db
          property: password
    healthCheckPath: /api/health

databases:
  - name: bolinho-bacalhau-db
    databaseName: bolinhodb
    user: bolinho_user
    plan: free
