# Root directory deste serviço: bolinho-frontend.
# VITE_API_URL = URL pública do backend (sem / no fim), "Available at Build Time".
# A imagem usa nginx.conf sem proxy "backend" (esse hostname só existe no Docker Compose).
# No backend, CORS_ALLOWED_ORIGINS deve incluir a URL pública deste frontend.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
