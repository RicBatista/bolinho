# Novo serviço no Railway com root = pasta bolinho-frontend (ou monorepo: definir root no dashboard).
# Variável VITE_API_URL: URL pública do backend (ex. https://bolinho-production.up.railway.app),
# sem barra no fim. Ativar "Available at Build Time" no painel.
# No backend, CORS_ALLOWED_ORIGINS deve incluir a URL pública deste frontend.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
