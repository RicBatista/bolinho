# Monorepo: força build por Docker (evita Railpack na raiz sem pom.xml/package.json).
# PostgreSQL: ligar o plugin ao serviço (PGHOST, PGDATABASE, PGUSER, PGPASSWORD, …).
# JWT_SECRET, CORS_ALLOWED_ORIGINS (URL do frontend), PORT é injetado pelo Railway.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "java -Djava.security.egd=file:/dev/./urandom -Dspring.profiles.active=prod -jar app.jar"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
