# Monorepo: força build por Docker (evita Railpack na raiz sem pom.xml/package.json).
# PostgreSQL: ligar o plugin ao serviço (PGHOST, PGDATABASE, PGUSER, PGPASSWORD, …).
# JWT_SECRET, CORS_ALLOWED_ORIGINS (URL do frontend), PORT é injetado pelo Railway.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Omitir startCommand: Railway usa o ENTRYPOINT do Dockerfile (WORKDIR /app).
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
